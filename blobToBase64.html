<script>
      function convertBlob() {
      const text = "Ich bin Juned. Ich lerne deutsch.";
      const blob = new Blob([text], {type: "plain/text"});

      const reader = new FileReader();
      reader.onload = function () {
        const base64Code = reader.result.split(',')[1];
           console.log('Base64 Code : ' , base64Code);
           const decodedText = atob(base64Code);
              console.log('Decoded Text : ' , decodedText);
      }
           reader.readAsDataURL(blob);
